<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeKeeper Pro</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s; overscroll-behavior-y: contain; }
        .timer-font { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark { background-color: #020617; color: #f8fafc; }
        .dark .bg-white, .dark .modal-bg { background-color: #0f172a; color: white; }
        .dark .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tap-bounce { transition: transform 0.1s; }
        .tap-bounce:active { transform: scale(0.95); }
        .date-tile { background-color: #f1f5f9 !important; color: #0f172a !important; }
        .dark .date-tile { background-color: #1e293b !important; color: #ffffff !important; }
        input[type="month"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, memo, useCallback } = React;

        // --- HELPER FUNCTIONS ---
        const formatDuration = (hours) => {
            const totalSeconds = Math.round(hours * 3600);
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            if (mins > 0) return `${mins}m ${secs}s`;
            return `${secs}s`;
        };

        // --- SUB-COMPONENTS ---
        const StatCard = memo(({ label, value }) => (
            <div className="glass p-3 rounded-2xl shadow-sm text-center">
                <p className="text-[8px] uppercase font-bold text-slate-400 mb-1">{label}</p>
                <p className="font-bold text-sm">£{value}</p>
            </div>
        ));

        const SessionCard = memo(({ e, onEdit, onDelete }) => (
            <div className="glass p-5 rounded-[2rem] flex justify-between items-center tap-bounce shadow-sm">
                <div className="flex items-center gap-4">
                    <div className="date-tile h-12 w-12 rounded-xl flex flex-col items-center justify-center font-bold">
                        <span className="text-[8px] uppercase opacity-60 leading-none mb-1">{new Date(e.start).toLocaleString('default',{month:'short'})}</span>
                        <span className="leading-none">{new Date(e.start).getDate()}</span>
                    </div>
                    <div>
                        <p className="font-black leading-none mb-1">{formatDuration(e.hours)}</p>
                        <p className="text-[10px] text-slate-400 font-bold uppercase leading-none">£{e.pay.toFixed(2)}</p>
                    </div>
                </div>
                <div className="flex gap-4 text-slate-300">
                    <button onClick={() => onEdit(e)} className="hover:text-blue-500 transition-colors"><i className="fa-solid fa-pen-to-square"></i></button>
                    <button onClick={() => onDelete(e.id)} className="hover:text-rose-500 transition-colors"><i className="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
        ));

        const MonthSection = memo(({ month, monthEntries, isCollapsed, onToggle, onEdit, onDelete }) => (
            <div className="space-y-3">
                <button onClick={() => onToggle(month)} className="flex items-center justify-between w-full px-2">
                    <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest">{month}</h3>
                    <i className={`fa-solid fa-chevron-down text-xs text-slate-300 transition-transform duration-300 ${isCollapsed ? '-rotate-90' : ''}`}></i>
                </button>
                {!isCollapsed && (
                    <div className="space-y-4 animate-in slide-in-from-top-2 duration-300">
                        {monthEntries.map(e => (
                            <SessionCard key={e.id} e={e} onEdit={onEdit} onDelete={onDelete} />
                        ))}
                    </div>
                )}
            </div>
        ));

        // --- MAIN APPLICATION ---
        const App = () => {
            // Core States with LocalStorage Hydration
            const [view, setView] = useState('dashboard');
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('work-entries')) || []);
            const [startTime, setStartTime] = useState(() => localStorage.getItem('active-start-time') ? new Date(localStorage.getItem('active-start-time')) : null);
            const [isPaused, setIsPaused] = useState(() => JSON.parse(localStorage.getItem('is-paused')) || false);
            const [accumulatedMs, setAccumulatedMs] = useState(() => JSON.parse(localStorage.getItem('accumulated-ms')) || 0);
            const [hourlyRate, setHourlyRate] = useState(() => parseFloat(localStorage.getItem('hourly-rate')) || 6.00);
            const [isDark, setIsDark] = useState(() => JSON.parse(localStorage.getItem('dark-mode')) || false);
            
            // UI States
            const [timer, setTimer] = useState({ elapsed: "00:00:00", livePay: "0.00" });
            const [editingEntry, setEditingEntry] = useState(null);
            const [reportMonth, setReportMonth] = useState(new Date().toISOString().slice(0, 7));
            const [collapsedMonths, setCollapsedMonths] = useState({});
            const [isGenerating, setIsGenerating] = useState(false);

            // AUTO-SAVE LOGIC: Entries Persistent Storage
            useEffect(() => {
                localStorage.setItem('work-entries', JSON.stringify(entries));
            }, [entries]);

            // App State Persistence
            useEffect(() => {
                localStorage.setItem('active-start-time', startTime ? startTime.toISOString() : '');
                localStorage.setItem('is-paused', JSON.stringify(isPaused));
                localStorage.setItem('accumulated-ms', JSON.stringify(accumulatedMs));
                localStorage.setItem('hourly-rate', hourlyRate);
                localStorage.setItem('dark-mode', JSON.stringify(isDark));
                document.body.className = isDark ? 'dark' : '';
            }, [startTime, isPaused, accumulatedMs, hourlyRate, isDark]);

            // Stats & Grouping
            const groupedEntries = useMemo(() => {
                const sorted = [...entries].sort((a, b) => new Date(b.start) - new Date(a.start));
                return sorted.reduce((groups, entry) => {
                    const monthKey = new Date(entry.start).toLocaleString('default', { month: 'long', year: 'numeric' });
                    if (!groups[monthKey]) groups[monthKey] = [];
                    groups[monthKey].push(entry);
                    return groups;
                }, {});
            }, [entries]);

            const stats = useMemo(() => {
                const now = new Date();
                const day = entries.filter(e => new Date(e.start).toDateString() === now.toDateString()).reduce((a, b) => a + b.pay, 0);
                const month = entries.filter(e => new Date(e.start).getMonth() === now.getMonth()).reduce((a, b) => a + b.pay, 0);
                return { day: day.toFixed(2), month: month.toFixed(2), total: entries.reduce((a, b) => a + b.pay, 0).toFixed(2) };
            }, [entries]);

            // Timer Tick
            useEffect(() => {
                let interval;
                if (startTime && !isPaused) {
                    interval = setInterval(() => {
                        const totalMs = (new Date() - startTime) + accumulatedMs;
                        const h = Math.floor(totalMs / 3600000);
                        const m = Math.floor((totalMs % 3600000) / 60000);
                        const s = Math.floor((totalMs % 60000) / 1000);
                        setTimer({
                            elapsed: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`,
                            livePay: ((totalMs / 3600000) * hourlyRate).toFixed(2)
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [startTime, isPaused, accumulatedMs, hourlyRate]);

            // Methods
            const toggleMonth = useCallback((month) => {
                setCollapsedMonths(p => ({...p, [month]: !p[month]}));
            }, []);

            const deleteEntry = useCallback((id) => {
                if(confirm("Delete this session?")) setEntries(prev => prev.filter(e => e.id !== id));
            }, []);

            const handleFinish = () => {
                if(!confirm("Finish and save this session?")) return;
                const ms = (startTime && !isPaused ? (new Date() - startTime) : 0) + accumulatedMs;
                const h = ms / 3600000;
                
                if(h > 0.0001) {
                    const newEntry = { 
                        id: Date.now(), 
                        start: new Date(Date.now()-ms).toISOString(), 
                        end: new Date().toISOString(), 
                        hours: h, 
                        pay: h * hourlyRate 
                    };
                    setEntries(prev => [...prev, newEntry]);
                }
                
                setStartTime(null); 
                setAccumulatedMs(0); 
                setIsPaused(false);
                setTimer({ elapsed: "00:00:00", livePay: "0.00" });
            };

            const generatePDF = () => {
                setIsGenerating(true);
                setTimeout(() => {
                    try {
                        const [year, month] = reportMonth.split('-');
                        const monthName = new Date(year, month - 1).toLocaleString('default', { month: 'long' });
                        const filtered = entries
                            .filter(e => {
                                const d = new Date(e.start);
                                return d.getFullYear() === parseInt(year) && (d.getMonth() + 1) === parseInt(month);
                            })
                            .sort((a, b) => new Date(b.start) - new Date(a.start));

                        const totalH = filtered.reduce((a, b) => a + b.hours, 0);
                        const totalP = filtered.reduce((a, b) => a + b.pay, 0);

                        const { jsPDF } = window.jspdf;
                        const doc = new jsPDF();
                        doc.setFontSize(22); doc.setTextColor(37, 99, 235); doc.text("TimeKeeper Report", 14, 20);
                        doc.setFontSize(12); doc.setTextColor(100); doc.text(`${monthName} ${year}`, 14, 28);

                        doc.autoTable({
                            startY: 35,
                            head: [['Date', 'Start', 'End', 'Duration', 'Earnings']],
                            body: filtered.map(e => [
                                new Date(e.start).toLocaleDateString('en-GB'),
                                new Date(e.start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
                                new Date(e.end).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
                                formatDuration(e.hours), 
                                `£${e.pay.toFixed(2)}`
                            ]),
                            headStyles: { fillColor: [37, 99, 235] }
                        });

                        const finalY = doc.lastAutoTable.finalY || 35;
                        doc.text(`Monthly Total: ${totalH.toFixed(2)} hours | £${totalP.toFixed(2)}`, 14, finalY + 15);
                        doc.save(`TimeKeeper_${monthName}_${year}.pdf`);
                    } catch (err) {
                        alert("PDF generation failed.");
                    } finally {
                        setIsGenerating(false);
                    }
                }, 100);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 pb-24">
                    <header className="flex justify-between items-center mb-8">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                                <i className="fa-solid fa-stopwatch text-xl"></i>
                            </div>
                            <h1 className="text-2xl font-black tracking-tight">TimeKeeper</h1>
                        </div>
                        <button onClick={() => setView(v => v === 'dashboard' ? 'settings' : 'dashboard')} className="w-12 h-12 glass rounded-2xl flex items-center justify-center tap-bounce">
                            <i className={`fa-solid ${view === 'dashboard' ? 'fa-gear' : 'fa-house'} text-slate-400`}></i>
                        </button>
                    </header>

                    {view === 'dashboard' ? (
                        <div className="space-y-6">
                            <section className={`rounded-[2.5rem] p-8 transition-all ${startTime && !isPaused ? 'bg-slate-900 text-white shadow-2xl' : 'glass shadow-xl'}`}>
                                <div className="text-center">
                                    <div className="timer-font text-6xl font-bold mb-4 tabular-nums">{timer.elapsed}</div>
                                    <div className="text-2xl font-black mb-8">£{timer.livePay}</div>
                                </div>
                                <div className="flex gap-3">
                                    {!startTime ? (
                                        <button onClick={() => setStartTime(new Date())} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-bold tap-bounce shadow-lg shadow-blue-500/20">Start Shift</button>
                                    ) : (
                                        <>
                                            <button onClick={() => {
                                                if(isPaused) { setStartTime(new Date()); setIsPaused(false); }
                                                else { setAccumulatedMs(m => m + (new Date() - startTime)); setIsPaused(true); }
                                            }} className="flex-1 py-5 bg-slate-800 text-white rounded-3xl font-bold tap-bounce">{isPaused ? "Resume" : "Pause"}</button>
                                            <button onClick={handleFinish} className="flex-1 py-5 bg-rose-500 text-white rounded-3xl font-bold tap-bounce">Finish</button>
                                        </>
                                    )}
                                </div>
                            </section>

                            <div className="grid grid-cols-3 gap-3">
                                <StatCard label="Today" value={stats.day} />
                                <StatCard label="Month" value={stats.month} />
                                <StatCard label="Total" value={stats.total} />
                            </div>

                            <div className="space-y-8 pt-4">
                                {Object.keys(groupedEntries).length === 0 ? (
                                    <p className="text-center text-slate-400 py-10 font-medium">No history recorded yet.</p>
                                ) : (
                                    Object.entries(groupedEntries).map(([month, monthEntries]) => (
                                        <MonthSection 
                                            key={month}
                                            month={month}
                                            monthEntries={monthEntries}
                                            isCollapsed={collapsedMonths[month]}
                                            onToggle={toggleMonth}
                                            onEdit={setEditingEntry}
                                            onDelete={deleteEntry}
                                        />
                                    ))
                                )}
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <div className="glass p-6 rounded-[2.5rem]">
                                <p className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Preferences</p>
                                <div className="flex justify-between items-center mb-6">
                                    <span>Hourly Rate</span>
                                    <div className="flex items-center font-black text-blue-600">
                                        <span className="mr-1">£</span>
                                        <input type="number" step="0.01" value={hourlyRate} onChange={e => setHourlyRate(parseFloat(e.target.value) || 0)} className="w-16 border-none p-0 text-right font-bold bg-transparent focus:ring-0" />
                                    </div>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span>Dark Mode</span>
                                    <button onClick={() => setIsDark(!isDark)} className={`w-12 h-6 rounded-full relative transition-colors ${isDark ? 'bg-blue-600' : 'bg-slate-200'}`}>
                                        <div className={`absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform ${isDark ? 'translate-x-6' : ''}`} />
                                    </button>
                                </div>
                            </div>

                            <div className="glass p-6 rounded-[2.5rem]">
                                <p className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Reports</p>
                                <input type="month" value={reportMonth} onChange={e => setReportMonth(e.target.value)} className="w-full mb-4 bg-slate-50 dark:bg-slate-800 rounded-2xl p-4 font-bold outline-none border border-slate-100 dark:border-slate-700" />
                                <button onClick={generatePDF} disabled={isGenerating} className={`w-full py-5 text-white rounded-2xl font-bold tap-bounce shadow-lg transition-all ${isGenerating ? 'bg-slate-400' : 'bg-blue-600 shadow-blue-500/20'}`}>
                                    {isGenerating ? "Generating PDF..." : "Download PDF"}
                                </button>
                            </div>

                            <button onClick={() => confirm("Clear all data?") && localStorage.clear() + location.reload()} className="w-full py-4 bg-rose-50 text-rose-600 rounded-2xl font-bold text-xs uppercase tracking-widest tap-bounce">Factory Reset</button>
                        </div>
                    )}

                    {editingEntry && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm">
                            <div className="modal-bg w-full max-w-sm rounded-[3rem] p-10 bg-white shadow-2xl">
                                <h3 className="text-xl font-black mb-6 text-center">Edit Session</h3>
                                <p className="text-sm text-slate-400 text-center mb-8">Manual entry and edit logic is synced to persistent storage.</p>
                                <button onClick={() => setEditingEntry(null)} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
