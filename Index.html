<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeKeeper Elite</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s; overscroll-behavior-y: contain; }
        .timer-font { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark { background-color: #020617; color: #f8fafc; }
        .dark .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tap-bounce { transition: transform 0.1s; }
        .tap-bounce:active { transform: scale(0.95); }
        input, select { background: transparent; border: 1.5px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem; width: 100%; color: inherit; }
        .dark input, .dark select { border-color: #334155; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- STABLE INPUT COMPONENT (Fixes Keyboard Glitch) ---
        const HourlyRateInput = ({ initialRate, onSave }) => {
            const [localValue, setLocalValue] = useState(initialRate);
            useEffect(() => setLocalValue(initialRate), [initialRate]);
            return (
                <div className="flex items-center gap-1 font-black text-blue-600" onClick={e => e.stopPropagation()}>
                    <span>£</span>
                    <input 
                        type="number" step="0.01" inputMode="decimal"
                        value={localValue} 
                        onChange={e => setLocalValue(e.target.value)}
                        onBlur={() => onSave(parseFloat(localValue) || 0)}
                        className="w-16 border-none text-right p-0 bg-transparent focus:ring-0"
                    />
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('work-entries')) || []);
            const [startTime, setStartTime] = useState(() => localStorage.getItem('active-start-time') ? new Date(localStorage.getItem('active-start-time')) : null);
            const [isPaused, setIsPaused] = useState(() => JSON.parse(localStorage.getItem('is-paused')) || false);
            const [accumulatedMs, setAccumulatedMs] = useState(() => JSON.parse(localStorage.getItem('accumulated-ms')) || 0);
            const [hourlyRate, setHourlyRate] = useState(() => parseFloat(localStorage.getItem('hourly-rate')) || 6.00);
            const [isDark, setIsDark] = useState(() => JSON.parse(localStorage.getItem('dark-mode')) || false);
            const [timer, setTimer] = useState({ elapsed: "00:00:00", livePay: "0.00" });
            
            // PDF State
            const [reportMonth, setReportMonth] = useState(new Date().toISOString().slice(0, 7));

            // --- SORTING ENGINE (Newest First) ---
            const sortedEntries = useMemo(() => {
                return [...entries].sort((a, b) => new Date(b.start) - new Date(a.start));
            }, [entries]);

            useEffect(() => {
                localStorage.setItem('work-entries', JSON.stringify(entries));
                localStorage.setItem('active-start-time', startTime ? startTime.toISOString() : '');
                localStorage.setItem('is-paused', JSON.stringify(isPaused));
                localStorage.setItem('accumulated-ms', JSON.stringify(accumulatedMs));
                localStorage.setItem('hourly-rate', hourlyRate);
                localStorage.setItem('dark-mode', JSON.stringify(isDark));
                document.body.className = isDark ? 'dark' : '';
            }, [entries, startTime, isPaused, accumulatedMs, hourlyRate, isDark]);

            // Timer Loop
            useEffect(() => {
                let interval;
                if (startTime && !isPaused) {
                    interval = setInterval(() => {
                        const totalMs = (new Date() - startTime) + accumulatedMs;
                        const h = Math.floor(totalMs / 3600000);
                        const m = Math.floor((totalMs % 3600000) / 60000);
                        const s = Math.floor((totalMs % 60000) / 1000);
                        setTimer({
                            elapsed: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`,
                            livePay: ((totalMs / 3600000) * hourlyRate).toFixed(2)
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [startTime, isPaused, accumulatedMs, hourlyRate]);

            const generateMonthlyPDF = () => {
                const [year, month] = reportMonth.split('-');
                const monthName = new Date(year, month - 1).toLocaleString('default', { month: 'long' });
                
                const filtered = sortedEntries.filter(e => {
                    const d = new Date(e.start);
                    return d.getFullYear() === parseInt(year) && (d.getMonth() + 1) === parseInt(month);
                });

                const totalH = filtered.reduce((a, b) => a + b.hours, 0);
                const totalP = filtered.reduce((a, b) => a + b.pay, 0);

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                // Header
                doc.setFontSize(22); doc.setTextColor(37, 99, 235);
                doc.text("TimeKeeper", 14, 20);
                doc.setFontSize(12); doc.setTextColor(100);
                doc.text(`Monthly Earnings Report: ${monthName} ${year}`, 14, 28);

                // Table
                doc.autoTable({
                    startY: 35,
                    head: [['Date', 'Start', 'End', 'Duration', 'Earnings']],
                    body: filtered.map(e => [
                        new Date(e.start).toLocaleDateString('en-GB'),
                        new Date(e.start).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                        new Date(e.end).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                        `${Math.floor(e.hours)}h ${Math.round((e.hours % 1) * 60)}m`,
                        `£${e.pay.toFixed(2)}`
                    ]),
                    headStyles: { fillColor: [37, 99, 235] },
                    alternateRowStyles: { fillColor: [245, 247, 250] }
                });

                // Summary
                const finalY = doc.lastAutoTable.finalY + 15;
                doc.setFontSize(14); doc.setTextColor(0);
                doc.text(`Total Hours: ${totalH.toFixed(2)}h`, 14, finalY);
                doc.text(`Total Earnings: £${totalP.toFixed(2)}`, 14, finalY + 8);

                doc.save(`TimeKeeper_${monthName}_${year}.pdf`);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 pb-24">
                    <header className="flex justify-between items-center mb-8">
                        <h1 className="text-xl font-black tracking-tight">TimeKeeper</h1>
                        <button onClick={() => setView(view === 'dashboard' ? 'settings' : 'dashboard')} className="w-12 h-12 glass rounded-2xl flex items-center justify-center">
                            <i className={`fa-solid ${view === 'dashboard' ? 'fa-gear' : 'fa-house'} text-slate-400`}></i>
                        </button>
                    </header>

                    {view === 'dashboard' ? (
                        <div className="animate-in fade-in duration-500">
                            <section className="glass rounded-[2.5rem] p-8 mb-8 text-center shadow-xl">
                                <p className="text-[10px] font-black uppercase text-blue-500 tracking-widest mb-2">Active Session</p>
                                <div className="timer-font text-6xl font-bold mb-4">{timer.elapsed}</div>
                                <div className="text-2xl font-black mb-8">£{timer.livePay}</div>
                                <div className="flex gap-3">
                                    {!startTime ? (
                                        <button onClick={() => setStartTime(new Date())} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-bold tap-bounce">Start Shift</button>
                                    ) : (
                                        <button onClick={() => {
                                            const finalMs = (new Date() - startTime) + accumulatedMs;
                                            const h = finalMs / 3600000;
                                            setEntries([{ id: Date.now(), start: new Date(Date.now()-finalMs).toISOString(), end: new Date().toISOString(), hours: h, pay: h * hourlyRate }, ...entries]);
                                            setStartTime(null); setAccumulatedMs(0); setIsPaused(false);
                                        }} className="w-full py-5 bg-rose-500 text-white rounded-3xl font-bold tap-bounce">Finish & Save</button>
                                    )}
                                </div>
                            </section>

                            <div className="space-y-4">
                                {sortedEntries.map(e => (
                                    <div key={e.id} className="glass p-5 rounded-[2rem] flex justify-between items-center">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-slate-100 dark:bg-slate-800 h-12 w-12 rounded-xl flex flex-col items-center justify-center">
                                                <span className="text-[8px] font-bold uppercase opacity-50">{new Date(e.start).toLocaleString('default', {month:'short'})}</span>
                                                <span className="text-lg font-black">{new Date(e.start).getDate()}</span>
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase">Duration</p>
                                                <p className="font-black">{e.hours.toFixed(2)}h</p>
                                            </div>
                                        </div>
                                        <p className="text-emerald-500 font-black text-xl">£{e.pay.toFixed(2)}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="animate-in slide-in-from-bottom duration-500 space-y-6">
                            <div className="glass p-6 rounded-[2rem]">
                                <p className="text-[10px] font-black uppercase text-slate-400 mb-4">Preferences</p>
                                <div className="flex justify-between items-center mb-6">
                                    <span className="font-bold">Hourly Rate</span>
                                    <HourlyRateInput initialRate={hourlyRate} onSave={setHourlyRate} />
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="font-bold">Dark Mode</span>
                                    <button onClick={() => setIsDark(!isDark)} className={`w-12 h-6 rounded-full relative transition-colors ${isDark ? 'bg-blue-600' : 'bg-slate-200'}`}>
                                        <div className={`absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform ${isDark ? 'translate-x-6' : ''}`} />
                                    </button>
                                </div>
                            </div>

                            <div className="glass p-6 rounded-[2rem]">
                                <p className="text-[10px] font-black uppercase text-slate-400 mb-4">Monthly Report</p>
                                <div className="space-y-4">
                                    <input type="month" value={reportMonth} onChange={e => setReportMonth(e.target.value)} />
                                    <button onClick={generateMonthlyPDF} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-file-pdf"></i> Download PDF
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
