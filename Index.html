<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeKeeper Chrono</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s; overscroll-behavior-y: contain; }
        .timer-font { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark { background-color: #020617; color: #f8fafc; }
        .dark .bg-white, .dark .modal-bg { background-color: #0f172a; color: white; }
        .dark .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tap-bounce { transition: transform 0.1s; }
        .tap-bounce:active { transform: scale(0.95); }
        input { background: transparent; border: 1.5px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem; width: 100%; color: inherit; }
        .dark input { border-color: #334155; }
        .date-tile { background-color: #f1f5f9 !important; color: #0f172a !important; }
        .dark .date-tile { background-color: #1e293b !important; color: #ffffff !important; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Stable Input Component (Fixed Keyboard Issue)
        const HourlyRateInput = ({ initialRate, onSave }) => {
            const [localValue, setLocalValue] = useState(initialRate);
            useEffect(() => setLocalValue(initialRate), [initialRate]);
            return (
                <div className="flex items-center gap-1 font-black text-blue-600" onClick={e => e.stopPropagation()}>
                    <span>£</span>
                    <input type="number" step="0.01" inputMode="decimal" value={localValue} 
                        onChange={e => setLocalValue(e.target.value)}
                        onBlur={() => onSave(parseFloat(localValue) || 0)}
                        className="w-16 border-none text-right p-0 bg-transparent focus:ring-0 font-bold"
                    />
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('work-entries')) || []);
            const [startTime, setStartTime] = useState(() => localStorage.getItem('active-start-time') ? new Date(localStorage.getItem('active-start-time')) : null);
            const [isPaused, setIsPaused] = useState(() => JSON.parse(localStorage.getItem('is-paused')) || false);
            const [accumulatedMs, setAccumulatedMs] = useState(() => JSON.parse(localStorage.getItem('accumulated-ms')) || 0);
            const [hourlyRate, setHourlyRate] = useState(() => parseFloat(localStorage.getItem('hourly-rate')) || 6.00);
            const [isDark, setIsDark] = useState(() => JSON.parse(localStorage.getItem('dark-mode')) || false);
            const [timer, setTimer] = useState({ elapsed: "00:00:00", livePay: "0.00" });
            const [reportMonth, setReportMonth] = useState(new Date().toISOString().slice(0, 7));
            const [editingEntry, setEditingEntry] = useState(null);

            useEffect(() => {
                localStorage.setItem('work-entries', JSON.stringify(entries));
                localStorage.setItem('active-start-time', startTime ? startTime.toISOString() : '');
                localStorage.setItem('is-paused', JSON.stringify(isPaused));
                localStorage.setItem('accumulated-ms', JSON.stringify(accumulatedMs));
                localStorage.setItem('hourly-rate', hourlyRate);
                localStorage.setItem('dark-mode', JSON.stringify(isDark));
                document.body.className = isDark ? 'dark' : '';
            }, [entries, startTime, isPaused, accumulatedMs, hourlyRate, isDark]);

            // UPDATED: Sorting to Oldest-First (A - B)
            const sortedEntries = useMemo(() => [...entries].sort((a, b) => new Date(a.start) - new Date(b.start)), [entries]);

            const stats = useMemo(() => {
                const now = new Date();
                const todayStr = now.toLocaleDateString();
                const weekLimit = new Date(); weekLimit.setDate(now.getDate() - 7);
                const monthLimit = new Date(); monthLimit.setDate(now.getDate() - 30);
                return {
                    daily: entries.filter(e => new Date(e.start).toLocaleDateString() === todayStr).reduce((a, b) => a + b.pay, 0),
                    weekly: entries.filter(e => new Date(e.start) >= weekLimit).reduce((a, b) => a + b.pay, 0),
                    monthly: entries.filter(e => new Date(e.start) >= monthLimit).reduce((a, b) => a + b.pay, 0)
                };
            }, [entries]);

            useEffect(() => {
                let interval;
                if (startTime && !isPaused) {
                    interval = setInterval(() => {
                        const totalMs = (new Date() - startTime) + accumulatedMs;
                        const h = Math.floor(totalMs / 3600000);
                        const m = Math.floor((totalMs % 3600000) / 60000);
                        const s = Math.floor((totalMs % 60000) / 1000);
                        setTimer({
                            elapsed: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`,
                            livePay: ((totalMs / 3600000) * hourlyRate).toFixed(2)
                        });
                    }, 1000);
                } else {
                    const totalMs = accumulatedMs;
                    const h = Math.floor(totalMs / 3600000);
                    const m = Math.floor((totalMs % 3600000) / 60000);
                    setTimer({ elapsed: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`, livePay: ((totalMs / 3600000) * hourlyRate).toFixed(2) });
                }
                return () => clearInterval(interval);
            }, [startTime, isPaused, accumulatedMs, hourlyRate]);

            const handleManualSubmit = (e) => {
                e.preventDefault();
                const d = new FormData(e.target);
                const rate = parseFloat(d.get('rate')) || hourlyRate;
                let start = new Date(`${d.get('date')}T${d.get('start')}`);
                let end = new Date(`${d.get('date')}T${d.get('end')}`);
                if (end <= start) end.setDate(end.getDate() + 1);
                const h = (end - start) / 3600000;
                const entry = { id: editingEntry.id, start: start.toISOString(), end: end.toISOString(), hours: h, pay: h * rate };
                setEntries(entries.map(ent => ent.id === editingEntry.id ? entry : ent));
                setEditingEntry(null);
            };

            const generatePDF = () => {
                const [year, month] = reportMonth.split('-');
                const monthName = new Date(year, month - 1).toLocaleString('default', { month: 'long' });
                const filtered = sortedEntries.filter(e => {
                    const d = new Date(e.start);
                    return d.getFullYear() === parseInt(year) && (d.getMonth() + 1) === parseInt(month);
                });
                const tH = filtered.reduce((a, b) => a + b.hours, 0);
                const tP = filtered.reduce((a, b) => a + b.pay, 0);
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(22); doc.setTextColor(37, 99, 235); doc.text("TimeKeeper", 14, 20);
                doc.setFontSize(12); doc.setTextColor(100); doc.text(`${monthName} ${year} Report`, 14, 28);
                doc.autoTable({
                    startY: 35,
                    head: [['Date', 'Start', 'End', 'Duration', 'Earnings']],
                    body: filtered.map(e => [new Date(e.start).toLocaleDateString('en-GB'), new Date(e.start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), new Date(e.end).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), `${Math.floor(e.hours)}h ${Math.round((e.hours%1)*60)}m`, `£${e.pay.toFixed(2)}`]),
                    headStyles: { fillColor: [37, 99, 235] }
                });
                doc.text(`Total Hours: ${tH.toFixed(2)}h`, 14, doc.lastAutoTable.finalY + 15);
                doc.text(`Total Earnings: £${tP.toFixed(2)}`, 14, doc.lastAutoTable.finalY + 23);
                doc.save(`TimeKeeper_${monthName}.pdf`);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 pb-24">
                    <header className="flex justify-between items-center mb-8">
                        <h1 className="text-xl font-black">TimeKeeper</h1>
                        <button onClick={() => setView(view === 'dashboard' ? 'settings' : 'dashboard')} className="w-12 h-12 glass rounded-2xl flex items-center justify-center tap-bounce">
                            <i className={`fa-solid ${view === 'dashboard' ? 'fa-gear' : 'fa-house'} text-slate-400`}></i>
                        </button>
                    </header>

                    {view === 'dashboard' ? (
                        <div className="animate-in fade-in duration-500">
                            <section className={`rounded-[2.5rem] p-8 mb-6 transition-all ${startTime && !isPaused ? 'bg-slate-900 text-white shadow-2xl' : 'glass shadow-xl'}`}>
                                <div className="text-center">
                                    <div className="timer-font text-6xl font-bold mb-4">{timer.elapsed}</div>
                                    <div className="text-2xl font-black mb-8">£{timer.livePay}</div>
                                </div>
                                <div className="flex gap-3">
                                    {!startTime ? (
                                        <button onClick={() => setStartTime(new Date())} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-bold tap-bounce">Start Shift</button>
                                    ) : (
                                        <>
                                            <button onClick={() => {
                                                if(isPaused) { setStartTime(new Date()); setIsPaused(false); }
                                                else { setAccumulatedMs(prev => prev + (new Date() - startTime)); setIsPaused(true); }
                                            }} className="flex-1 py-5 bg-slate-800 text-white rounded-3xl font-bold tap-bounce">{isPaused ? "Resume" : "Pause"}</button>
                                            <button onClick={() => {
                                                const ms = (startTime && !isPaused ? (new Date() - startTime) : 0) + accumulatedMs;
                                                const h = ms / 3600000;
                                                if(h > 0.01) setEntries([...entries, { id: Date.now(), start: new Date(Date.now()-ms).toISOString(), end: new Date().toISOString(), hours: h, pay: h * hourlyRate }]);
                                                setStartTime(null); setAccumulatedMs(0); setIsPaused(false);
                                            }} className="flex-1 py-5 bg-rose-500 text-white rounded-3xl font-bold tap-bounce">Finish</button>
                                        </>
                                    )}
                                </div>
                            </section>

                            <div className="grid grid-cols-3 gap-3 mb-8 text-center">
                                <div className="glass p-3 rounded-2xl"><p className="text-[8px] uppercase font-bold text-slate-400 mb-1">Daily</p><p className="font-bold text-sm">£{stats.daily.toFixed(2)}</p></div>
                                <div className="glass p-3 rounded-2xl"><p className="text-[8px] uppercase font-bold text-slate-400 mb-1">Weekly</p><p className="font-bold text-sm">£{stats.weekly.toFixed(2)}</p></div>
                                <div className="glass p-3 rounded-2xl"><p className="text-[8px] uppercase font-bold text-slate-400 mb-1">Monthly</p><p className="font-bold text-sm">£{stats.monthly.toFixed(2)}</p></div>
                            </div>

                            <div className="space-y-4">
                                {sortedEntries.map(e => (
                                    <div key={e.id} className="glass p-5 rounded-[2rem] flex justify-between items-center active:scale-95 transition-transform">
                                        <div className="flex items-center gap-4">
                                            <div className="date-tile h-12 w-12 rounded-xl flex flex-col items-center justify-center font-bold shadow-sm">
                                                <span className="text-[8px] uppercase opacity-60">{new Date(e.start).toLocaleString('default',{month:'short'})}</span>
                                                <span>{new Date(e.start).getDate()}</span>
                                            </div>
                                            <div>
                                                <p className="font-black">{e.hours.toFixed(2)}h</p>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase">£{e.pay.toFixed(2)}</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-4 text-slate-300">
                                            <button onClick={() => setEditingEntry(e)} className="tap-bounce hover:text-blue-500"><i className="fa-solid fa-pen-to-square"></i></button>
                                            <button onClick={() => confirm("Delete?") && setEntries(entries.filter(x=>x.id!==e.id))} className="tap-bounce hover:text-rose-500"><i className="fa-solid fa-trash-can"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="animate-in slide-in-from-bottom duration-500 space-y-6">
                            <div className="glass p-6 rounded-[2.5rem]">
                                <div className="flex justify-between items-center mb-6"><span>Hourly Rate</span><HourlyRateInput initialRate={hourlyRate} onSave={setHourlyRate} /></div>
                                <div className="flex justify-between items-center"><span>Dark Mode</span><button onClick={()=>setIsDark(!isDark)} className={`w-12 h-6 rounded-full relative ${isDark?'bg-blue-600':'bg-slate-200'}`}><div className={`absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform ${isDark?'translate-x-6':''}`} /></button></div>
                            </div>
                            <div className="glass p-6 rounded-[2.5rem]">
                                <p className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Generate Report</p>
                                <input type="month" value={reportMonth} onChange={e=>setReportMonth(e.target.value)} className="mb-4" />
                                <button onClick={generatePDF} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold tap-bounce">Download PDF</button>
                            </div>
                        </div>
                    )}

                    {editingEntry && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm animate-in fade-in">
                            <div className="modal-bg w-full max-w-sm rounded-[3rem] p-10 shadow-2xl bg-white animate-in zoom-in duration-300">
                                <h3 className="text-xl font-black mb-6 text-center">Edit Session</h3>
                                <form onSubmit={handleManualSubmit} className="space-y-5">
                                    <input type="date" name="date" required defaultValue={new Date(editingEntry.start).toISOString().split('T')[0]} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="time" name="start" required defaultValue={new Date(editingEntry.start).toTimeString().slice(0,5)} />
                                        <input type="time" name="end" required defaultValue={new Date(editingEntry.end).toTimeString().slice(0,5)} />
                                    </div>
                                    <input type="number" step="0.01" name="rate" required defaultValue={(editingEntry.pay / editingEntry.hours).toFixed(2)} />
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => setEditingEntry(null)} className="flex-1 py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold tap-bounce">Cancel</button>
                                        <button type="submit" className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold tap-bounce">Save</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
