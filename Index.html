   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeKeeper Elite</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .timer-font { font-family: 'JetBrains Mono', monospace; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            // --- State ---
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('work-entries')) || []);
            const [startTime, setStartTime] = useState(() => {
                const saved = localStorage.getItem('active-start-time');
                return saved ? new Date(saved) : null;
            });
            const [hourlyRate, setHourlyRate] = useState(() => parseFloat(localStorage.getItem('hourly-rate')) || 6.00);
            const [timer, setTimer] = useState({ elapsed: "00:00:00", livePay: "0.00" });
            const [editingId, setEditingId] = useState(null);

            // --- Timer Logic ---
            useEffect(() => {
                let interval;
                if (startTime) {
                    interval = setInterval(() => {
                        const now = new Date();
                        const diffMs = now - startTime;
                        const h = Math.floor(diffMs / 3600000);
                        const m = Math.floor((diffMs % 3600000) / 60000);
                        const s = Math.floor((diffMs % 60000) / 1000);
                        
                        const liveHours = diffMs / 3600000;
                        const livePay = (liveHours * hourlyRate).toFixed(2);
                        
                        setTimer({
                            elapsed: `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`,
                            livePay
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [startTime, hourlyRate]);

            // --- Persistence ---
            useEffect(() => {
                localStorage.setItem('work-entries', JSON.stringify(entries));
                localStorage.setItem('active-start-time', startTime ? startTime.toISOString() : '');
                localStorage.setItem('hourly-rate', hourlyRate.toString());
            }, [entries, startTime, hourlyRate]);

            // --- Core Actions ---
            const handleClockIn = () => !startTime && setStartTime(new Date());

            const handleClockOut = () => {
                if (!startTime || !confirm("Finish work and save session?")) return;
                const endTime = new Date();
                const diffMs = endTime - startTime;
                if (diffMs < 1000) return setStartTime(null); // Ignore clicks under 1s

                const hours = diffMs / 3600000;
                const newEntry = {
                    id: Date.now(),
                    start: startTime.toISOString(),
                    end: endTime.toISOString(),
                    hours: parseFloat(hours.toFixed(4)), // High precision for math
                    pay: parseFloat((hours * hourlyRate).toFixed(2))
                };
                setEntries([newEntry, ...entries]);
                setStartTime(null);
            };

            const deleteEntry = (id) => confirm("Delete this entry?") && setEntries(entries.filter(e => e.id !== id));

            const updateEntry = (id, newStartStr, newEndStr) => {
                const updatedEntries = entries.map(e => {
                    if (e.id === id) {
                        const s = new Date(e.start);
                        const en = new Date(e.end);
                        const [sH, sM] = newStartStr.split(':');
                        const [eH, eM] = newEndStr.split(':');
                        s.setHours(sH, sM);
                        en.setHours(eH, eM);
                        
                        const hours = (en - s) / 3600000;
                        return { 
                            ...e, 
                            start: s.toISOString(), 
                            end: en.toISOString(), 
                            hours: Math.max(0, hours), 
                            pay: Math.max(0, hours * hourlyRate) 
                        };
                    }
                    return e;
                });
                setEntries(updatedEntries);
                setEditingId(null);
            };

            // --- Stats Calculation ---
            const stats = useMemo(() => {
                const now = new Date();
                const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay()));
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

                return entries.reduce((acc, curr) => {
                    const date = new Date(curr.start);
                    acc.totalH += curr.hours;
                    acc.totalP += curr.pay;

                    if (date.toLocaleDateString() === new Date().toLocaleDateString()) {
                        acc.todayH += curr.hours;
                        acc.todayP += curr.pay;
                    }
                    if (date >= startOfWeek) acc.weekP += curr.pay;
                    if (date >= startOfMonth) acc.monthP += curr.pay;
                    
                    return acc;
                }, { totalH: 0, totalP: 0, todayH: 0, todayP: 0, weekP: 0, monthP: 0 });
            }, [entries]);

            const formatDuration = (hours) => {
                const mins = Math.round(hours * 60);
                if (mins < 60) return `${mins}m`;
                return `${Math.floor(mins/60)}h ${mins%60}m`;
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-10">
                    {/* Header */}
                    <div className="p-6 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-extrabold text-slate-800">TimeKeeper</h1>
                            <p className="text-xs font-bold text-blue-500 uppercase tracking-widest">Elite Tracker</p>
                        </div>
                        <div className="bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-2">
                            <span className="text-xs font-bold text-slate-400">£/hr</span>
                            <input type="number" value={hourlyRate} onChange={(e) => setHourlyRate(parseFloat(e.target.value) || 0)} className="w-12 font-black outline-none" />
                        </div>
                    </div>

                    {/* Active Timer Card */}
                    <div className="px-6 mb-8">
                        <div className={`rounded-[2.5rem] p-8 text-center transition-all duration-500 ${startTime ? 'bg-slate-900 text-white shadow-2xl shadow-slate-400' : 'bg-white border border-slate-100 shadow-xl shadow-slate-200/50'}`}>
                            <div className="timer-font text-5xl font-black mb-2 tracking-tighter">
                                {startTime ? timer.elapsed : "00:00:00"}
                            </div>
                            {startTime && (
                                <div className="text-green-400 font-bold text-lg mb-6 animate-pulse">
                                    + £{timer.livePay}
                                </div>
                            )}
                            {!startTime && <div className="text-slate-400 font-semibold mb-6">Ready to work?</div>}
                            
                            <button 
                                onClick={startTime ? handleClockOut : handleClockIn}
                                className={`w-full py-5 rounded-3xl font-black text-xl transition-all active:scale-95 flex items-center justify-center gap-3 ${startTime ? 'bg-rose-500 text-white shadow-lg shadow-rose-500/40' : 'bg-blue-600 text-white shadow-lg shadow-blue-600/40'}`}
                            >
                                <i className={`fa-solid ${startTime ? 'fa-stop-circle' : 'fa-play-circle'}`}></i>
                                {startTime ? "FINISH" : "START CLOCK"}
                            </button>
                        </div>
                    </div>

                    {/* Stats Dashboard */}
                    <div className="px-6 grid grid-cols-2 gap-4 mb-8">
                        <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Today</p>
                            <p className="text-lg font-black text-slate-800">£{stats.todayP.toFixed(2)}</p>
                            <p className="text-[10px] font-bold text-blue-500">{stats.todayH.toFixed(2)} hrs</p>
                        </div>
                        <div className="bg-blue-600 p-5 rounded-3xl shadow-lg shadow-blue-600/20 text-white">
                            <p className="text-[10px] font-black text-blue-200 uppercase mb-1">Total Earned</p>
                            <p className="text-lg font-black">£{stats.totalP.toFixed(2)}</p>
                            <p className="text-[10px] font-bold text-blue-100">{stats.totalH.toFixed(2)} hrs</p>
                        </div>
                        <div className="bg-white p-4 rounded-2xl border border-slate-100 text-center">
                            <p className="text-[10px] font-black text-slate-400 uppercase">Weekly</p>
                            <p className="font-black text-slate-700 leading-none mt-1">£{stats.weekP.toFixed(2)}</p>
                        </div>
                        <div className="bg-white p-4 rounded-2xl border border-slate-100 text-center">
                            <p className="text-[10px] font-black text-slate-400 uppercase">Monthly</p>
                            <p className="font-black text-slate-700 leading-none mt-1">£{stats.monthP.toFixed(2)}</p>
                        </div>
                    </div>

                    {/* History */}
                    <div className="px-6 space-y-4">
                        <h2 className="font-black text-slate-800 flex items-center justify-between">
                            <span>Activity Log</span>
                            <span className="text-[10px] bg-slate-200 px-2 py-1 rounded-md">{entries.length} Sessions</span>
                        </h2>
                        
                        {entries.map(e => (
                            <div key={e.id} className="bg-white p-5 rounded-3xl border border-slate-50 shadow-sm relative overflow-hidden">
                                {editingId === e.id ? (
                                    <div className="space-y-4">
                                        <div className="flex gap-2">
                                            <input type="time" id={`s-${e.id}`} defaultValue={new Date(e.start).toTimeString().slice(0,5)} className="bg-slate-50 p-2 rounded-lg w-full font-bold" />
                                            <input type="time" id={`e-${e.id}`} defaultValue={new Date(e.end).toTimeString().slice(0,5)} className="bg-slate-50 p-2 rounded-lg w-full font-bold" />
                                        </div>
                                        <button onClick={() => updateEntry(e.id, document.getElementById(`s-${e.id}`).value, document.getElementById(`e-${e.id}`).value)} className="w-full bg-slate-800 text-white py-2 rounded-xl font-bold">Save Changes</button>
                                    </div>
                                ) : (
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-slate-50 h-12 w-12 rounded-2xl flex flex-col items-center justify-center text-slate-400">
                                                <span className="text-[8px] font-black uppercase">{new Date(e.start).toLocaleDateString('en-GB', {month:'short'})}</span>
                                                <span className="text-sm font-black text-slate-700">{new Date(e.start).getDate()}</span>
                                            </div>
                                            <div>
                                                <p className="text-xs font-bold text-slate-800">{new Date(e.start).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - {new Date(e.end).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                                                <p className="text-[10px] font-bold text-slate-400 tracking-wide">{formatDuration(e.hours)} total duration</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="text-right">
                                                <p className="font-black text-slate-900 leading-none">£{e.pay.toFixed(2)}</p>
                                                <div className="mt-1 flex gap-2 justify-end">
                                                    <button onClick={() => setEditingId(e.id)} className="text-slate-300 hover:text-blue-500 text-xs"><i className="fa-solid fa-pen"></i></button>
                                                    <button onClick={() => deleteEntry(e.id)} className="text-slate-300 hover:text-rose-500 text-xs"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
