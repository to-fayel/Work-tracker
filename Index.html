<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeKeeper Pro</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .timer-font { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark { background-color: #020617; color: #f8fafc; }
        .dark .modal-bg { background-color: #0f172a; color: white; }
        .dark .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tap-bounce:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="bg-slate-50 transition-colors duration-400">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, memo, useCallback } = React;

        // --- 1. MEMOIZED UI COMPONENTS ---

        const StatCard = memo(({ label, value }) => (
            <div className="glass p-3 rounded-2xl shadow-sm text-center">
                <p className="text-[8px] uppercase font-bold text-slate-400 mb-1">{label}</p>
                <p className="font-bold text-sm">£{value}</p>
            </div>
        ));

        const HistoryEntry = memo(({ entry, onEdit, onDelete }) => (
            <div className="glass p-5 rounded-[2rem] flex justify-between items-center tap-bounce shadow-sm">
                <div className="flex items-center gap-4">
                    <div className="bg-slate-100 dark:bg-slate-800 h-12 w-12 rounded-xl flex flex-col items-center justify-center font-bold">
                        <span className="text-[8px] uppercase opacity-60 mb-1">{new Date(entry.start).toLocaleString('default',{month:'short'})}</span>
                        <span>{new Date(entry.start).getDate()}</span>
                    </div>
                    <div>
                        <p className="font-black">{entry.hours.toFixed(2)}h</p>
                        <p className="text-[10px] text-slate-400 font-bold uppercase">£{entry.pay.toFixed(2)}</p>
                    </div>
                </div>
                <div className="flex gap-4 text-slate-300">
                    <button onClick={() => onEdit(entry)} className="hover:text-blue-500"><i className="fa-solid fa-pen-to-square"></i></button>
                    <button onClick={() => onDelete(entry.id)} className="hover:text-rose-500"><i className="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
        ));

        // --- 2. LOGIC COMPONENTS ---

        const App = () => {
            // Persistent State
            const [view, setView] = useState('dashboard');
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('work-entries')) || []);
            const [startTime, setStartTime] = useState(() => localStorage.getItem('active-start-time') ? new Date(localStorage.getItem('active-start-time')) : null);
            const [isPaused, setIsPaused] = useState(() => JSON.parse(localStorage.getItem('is-paused')) || false);
            const [accumulatedMs, setAccumulatedMs] = useState(() => JSON.parse(localStorage.getItem('accumulated-ms')) || 0);
            const [hourlyRate, setHourlyRate] = useState(() => parseFloat(localStorage.getItem('hourly-rate')) || 6.00);
            const [isDark, setIsDark] = useState(() => JSON.parse(localStorage.getItem('dark-mode')) || false);
            
            // Temporary State
            const [timer, setTimer] = useState({ elapsed: "00:00:00", livePay: "0.00" });
            const [editingEntry, setEditingEntry] = useState(null);
            const [reportMonth, setReportMonth] = useState(new Date().toISOString().slice(0, 7));
            const [collapsedMonths, setCollapsedMonths] = useState({});

            // Effect: Global Sync
            useEffect(() => {
                localStorage.setItem('work-entries', JSON.stringify(entries));
                localStorage.setItem('active-start-time', startTime ? startTime.toISOString() : '');
                localStorage.setItem('is-paused', JSON.stringify(isPaused));
                localStorage.setItem('accumulated-ms', JSON.stringify(accumulatedMs));
                localStorage.setItem('hourly-rate', hourlyRate);
                localStorage.setItem('dark-mode', JSON.stringify(isDark));
                document.body.className = isDark ? 'dark' : '';
            }, [entries, startTime, isPaused, accumulatedMs, hourlyRate, isDark]);

            // Memoized Calculations (Performance)
            const groupedEntries = useMemo(() => {
                const sorted = [...entries].sort((a, b) => new Date(a.start) - new Date(b.start));
                return sorted.reduce((groups, entry) => {
                    const monthKey = new Date(entry.start).toLocaleString('default', { month: 'long', year: 'numeric' });
                    if (!groups[monthKey]) groups[monthKey] = [];
                    groups[monthKey].push(entry);
                    return groups;
                }, {});
            }, [entries]);

            const stats = useMemo(() => {
                const now = new Date();
                const day = entries.filter(e => new Date(e.start).toDateString() === now.toDateString()).reduce((a, b) => a + b.pay, 0);
                const month = entries.filter(e => new Date(e.start).getMonth() === now.getMonth()).reduce((a, b) => a + b.pay, 0);
                return { day: day.toFixed(2), month: month.toFixed(2), total: entries.reduce((a, b) => a + b.pay, 0).toFixed(2) };
            }, [entries]);

            // Timer Loop
            useEffect(() => {
                let interval;
                if (startTime && !isPaused) {
                    interval = setInterval(() => {
                        const totalMs = (new Date() - startTime) + accumulatedMs;
                        const h = Math.floor(totalMs / 3600000);
                        const m = Math.floor((totalMs % 3600000) / 60000);
                        const s = Math.floor((totalMs % 60000) / 1000);
                        setTimer({
                            elapsed: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`,
                            livePay: ((totalMs / 3600000) * hourlyRate).toFixed(2)
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [startTime, isPaused, accumulatedMs, hourlyRate]);

            // Callbacks
            const deleteEntry = useCallback((id) => {
                if(confirm("Delete this session?")) setEntries(prev => prev.filter(e => e.id !== id));
            }, []);

            const finishShift = () => {
                if(!confirm("Finish and save shift?")) return;
                const totalMs = (startTime && !isPaused ? (new Date() - startTime) : 0) + accumulatedMs;
                const hours = totalMs / 3600000;
                if(hours > 0.01) {
                    setEntries(prev => [...prev, {
                        id: Date.now(),
                        start: new Date(Date.now() - totalMs).toISOString(),
                        end: new Date().toISOString(),
                        hours,
                        pay: hours * hourlyRate
                    }]);
                }
                setStartTime(null); setAccumulatedMs(0); setIsPaused(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 pb-24">
                    <header className="flex justify-between items-center mb-8">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                                <i className="fa-solid fa-stopwatch text-xl"></i>
                            </div>
                            <h1 className="text-2xl font-black tracking-tight">TimeKeeper</h1>
                        </div>
                        <button onClick={() => setView(v => v === 'dashboard' ? 'settings' : 'dashboard')} className="w-12 h-12 glass rounded-2xl flex items-center justify-center tap-bounce">
                            <i className={`fa-solid ${view === 'dashboard' ? 'fa-gear' : 'fa-house'} text-slate-400`}></i>
                        </button>
                    </header>

                    {view === 'dashboard' ? (
                        <div className="space-y-6">
                            <section className={`rounded-[2.5rem] p-8 transition-all ${startTime && !isPaused ? 'bg-slate-900 text-white shadow-2xl' : 'glass shadow-xl'}`}>
                                <div className="text-center">
                                    <div className="timer-font text-6xl font-bold mb-4 tabular-nums">{timer.elapsed}</div>
                                    <div className="text-2xl font-black mb-8">£{timer.livePay}</div>
                                </div>
                                <div className="flex gap-3">
                                    {!startTime ? (
                                        <button onClick={() => setStartTime(new Date())} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-bold tap-bounce">Start Shift</button>
                                    ) : (
                                        <>
                                            <button onClick={() => {
                                                if(isPaused) { setStartTime(new Date()); setIsPaused(false); }
                                                else { setAccumulatedMs(m => m + (new Date() - startTime)); setIsPaused(true); }
                                            }} className="flex-1 py-5 bg-slate-800 text-white rounded-3xl font-bold tap-bounce">{isPaused ? "Resume" : "Pause"}</button>
                                            <button onClick={finishShift} className="flex-1 py-5 bg-rose-500 text-white rounded-3xl font-bold tap-bounce">Finish</button>
                                        </>
                                    )}
                                </div>
                            </section>

                            <div className="grid grid-cols-3 gap-3">
                                <StatCard label="Today" value={stats.day} />
                                <StatCard label="Month" value={stats.month} />
                                <StatCard label="Total" value={stats.total} />
                            </div>

                            <div className="space-y-8 pt-4">
                                {Object.entries(groupedEntries).map(([month, monthEntries]) => (
                                    <div key={month} className="space-y-3">
                                        <button onClick={() => setCollapsedMonths(p => ({...p, [month]: !p[month]}))} className="flex justify-between w-full px-2">
                                            <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest">{month}</h3>
                                            <i className={`fa-solid fa-chevron-down text-xs transition-transform ${collapsedMonths[month] ? '-rotate-90' : ''}`}></i>
                                        </button>
                                        {!collapsedMonths[month] && (
                                            <div className="space-y-4">
                                                {monthEntries.map(e => (
                                                    <HistoryEntry key={e.id} entry={e} onEdit={setEditingEntry} onDelete={deleteEntry} />
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <div className="glass p-6 rounded-[2.5rem]">
                                <div className="flex justify-between items-center mb-6">
                                    <span>Hourly Rate</span>
                                    <div className="flex items-center font-black text-blue-600">
                                        <span>£</span>
                                        <input type="number" step="0.01" value={hourlyRate} onChange={e => setHourlyRate(e.target.value)} className="w-14 border-none p-0 text-right font-bold bg-transparent focus:ring-0" />
                                    </div>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span>Dark Mode</span>
                                    <button onClick={() => setIsDark(!isDark)} className={`w-12 h-6 rounded-full relative transition-colors ${isDark ? 'bg-blue-600' : 'bg-slate-200'}`}>
                                        <div className={`absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform ${isDark ? 'translate-x-6' : ''}`} />
                                    </button>
                                </div>
                            </div>
                            <div className="glass p-6 rounded-[2.5rem]">
                                <p className="text-[10px] font-black uppercase text-slate-400 mb-4">Export Report</p>
                                <input type="month" value={reportMonth} onChange={e => setReportMonth(e.target.value)} className="w-full mb-4 bg-slate-50 dark:bg-slate-800 rounded-xl p-3 outline-none" />
                                <button className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold tap-bounce">Download PDF</button>
                            </div>
                            <button onClick={() => confirm("Clear all data?") && localStorage.clear() + location.reload()} className="w-full py-4 bg-rose-50 text-rose-600 rounded-2xl font-bold text-xs uppercase tracking-widest">Factory Reset</button>
                        </div>
                    )}

                    {/* Edit Modal Logic */}
                    {editingEntry && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm">
                            <div className="modal-bg w-full max-w-sm rounded-[3rem] p-10 bg-white shadow-2xl">
                                <h3 className="text-xl font-black mb-6 text-center text-slate-800 dark:text-white">Edit Session</h3>
                                <div className="space-y-4">
                                    <input type="date" defaultValue={new Date(editingEntry.start).toISOString().split('T')[0]} className="w-full p-4 border rounded-2xl dark:bg-slate-800 dark:border-slate-700" />
                                    <div className="flex gap-4">
                                        <button onClick={() => setEditingEntry(null)} className="flex-1 py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold">Cancel</button>
                                        <button className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold">Save</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
