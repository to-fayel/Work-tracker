<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeKeeper Pro Max</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .timer-font { font-family: 'JetBrains Mono', monospace; }
        input[type="time"] { border: none; background: transparent; font-weight: 800; width: 100%; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            // --- State ---
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('work-entries')) || []);
            const [startTime, setStartTime] = useState(() => {
                const saved = localStorage.getItem('active-start-time');
                return saved ? new Date(saved) : null;
            });
            const [isPaused, setIsPaused] = useState(() => JSON.parse(localStorage.getItem('is-paused')) || false);
            const [accumulatedMs, setAccumulatedMs] = useState(() => JSON.parse(localStorage.getItem('accumulated-ms')) || 0);
            const [hourlyRate, setHourlyRate] = useState(() => parseFloat(localStorage.getItem('hourly-rate')) || 6.00);
            const [timer, setTimer] = useState({ elapsed: "00:00:00", livePay: "0.00" });
            const [editingId, setEditingId] = useState(null);

            // --- Persistence ---
            useEffect(() => {
                localStorage.setItem('work-entries', JSON.stringify(entries));
                localStorage.setItem('active-start-time', startTime ? startTime.toISOString() : '');
                localStorage.setItem('is-paused', JSON.stringify(isPaused));
                localStorage.setItem('accumulated-ms', JSON.stringify(accumulatedMs));
                localStorage.setItem('hourly-rate', hourlyRate.toString());
            }, [entries, startTime, isPaused, accumulatedMs, hourlyRate]);

            // --- Timer Logic ---
            useEffect(() => {
                let interval;
                if (startTime && !isPaused) {
                    interval = setInterval(() => {
                        const now = new Date();
                        const sessionMs = now - startTime;
                        const totalMs = accumulatedMs + sessionMs;
                        
                        const h = Math.floor(totalMs / 3600000);
                        const m = Math.floor((totalMs % 3600000) / 60000);
                        const s = Math.floor((totalMs % 60000) / 1000);
                        
                        const liveHours = totalMs / 3600000;
                        setTimer({
                            elapsed: `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`,
                            livePay: (liveHours * hourlyRate).toFixed(2)
                        });
                    }, 1000);
                } else if (isPaused || !startTime) {
                    // Update display for paused state
                    const h = Math.floor(accumulatedMs / 3600000);
                    const m = Math.floor((accumulatedMs % 3600000) / 60000);
                    const s = Math.floor((accumulatedMs % 60000) / 1000);
                    setTimer({
                        elapsed: `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`,
                        livePay: ((accumulatedMs / 3600000) * hourlyRate).toFixed(2)
                    });
                }
                return () => clearInterval(interval);
            }, [startTime, isPaused, accumulatedMs, hourlyRate]);

            // --- Core Actions ---
            const handleClockIn = () => {
                setStartTime(new Date());
                setIsPaused(false);
                setAccumulatedMs(0);
            };

            const handlePauseResume = () => {
                if (isPaused) {
                    setStartTime(new Date());
                    setIsPaused(false);
                } else {
                    const sessionMs = new Date() - startTime;
                    setAccumulatedMs(prev => prev + sessionMs);
                    setIsPaused(true);
                }
            };

            const handleClockOut = () => {
                if (!confirm("Finish work and save session?")) return;
                
                let finalMs = accumulatedMs;
                if (startTime && !isPaused) {
                    finalMs += (new Date() - startTime);
                }

                if (finalMs < 1000) {
                    resetClock();
                    return;
                }

                const hours = finalMs / 3600000;
                const newEntry = {
                    id: Date.now(),
                    start: new Date(Date.now() - finalMs).toISOString(),
                    end: new Date().toISOString(),
                    hours: parseFloat(hours.toFixed(4)),
                    pay: parseFloat((hours * hourlyRate).toFixed(2))
                };
                
                setEntries([newEntry, ...entries]);
                resetClock();
            };

            const resetClock = () => {
                setStartTime(null);
                setIsPaused(false);
                setAccumulatedMs(0);
            };

            const deleteEntry = (id) => confirm("Delete this entry?") && setEntries(entries.filter(e => e.id !== id));

            const exportCSV = () => {
                const headers = "Date,Start Time,End Time,Duration (Hrs),Earnings (£)\n";
                const rows = entries.map(e => {
                    const d = new Date(e.start);
                    return `${d.toLocaleDateString()},${d.toLocaleTimeString()},${new Date(e.end).toLocaleTimeString()},${e.hours.toFixed(2)},${e.pay.toFixed(2)}`;
                }).join("\n");
                
                const blob = new Blob([headers + rows], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `WorkLogs_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`;
                a.click();
            };

            // --- Stats ---
            const stats = useMemo(() => {
                const now = new Date();
                const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay()));
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

                return entries.reduce((acc, curr) => {
                    const date = new Date(curr.start);
                    acc.totalH += curr.hours;
                    acc.totalP += curr.pay;

                    if (date.toLocaleDateString() === new Date().toLocaleDateString()) {
                        acc.todayH += curr.hours;
                        acc.todayP += curr.pay;
                    }
                    if (date >= startOfWeek) { acc.weekP += curr.pay; acc.weekH += curr.hours; }
                    if (date >= startOfMonth) { acc.monthP += curr.pay; acc.monthH += curr.hours; }
                    
                    return acc;
                }, { totalH: 0, totalP: 0, todayH: 0, todayP: 0, weekP: 0, weekH: 0, monthP: 0, monthH: 0 });
            }, [entries]);

            return (
                <div className="max-w-md mx-auto min-h-screen pb-10">
                    <div className="p-6 flex justify-between items-center">
                        <h1 className="text-2xl font-extrabold text-slate-800 tracking-tight">TimeKeeper<span className="text-blue-600">.</span></h1>
                        <div className="bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-2">
                            <span className="text-[10px] font-black text-slate-400 uppercase">Rate</span>
                            <input type="number" value={hourlyRate} onChange={(e) => setHourlyRate(parseFloat(e.target.value) || 0)} className="w-10 font-black outline-none text-blue-600" />
                        </div>
                    </div>

                    {/* Timer Section */}
                    <div className="px-6 mb-8">
                        <div className={`rounded-[2.5rem] p-8 text-center transition-all duration-500 ${startTime ? 'bg-slate-900 text-white shadow-2xl' : 'bg-white border border-slate-100 shadow-xl shadow-slate-200/50'}`}>
                            <div className="timer-font text-5xl font-black mb-2 tracking-tighter tabular-nums">
                                {timer.elapsed}
                            </div>
                            <div className={`text-lg font-bold mb-6 ${isPaused ? 'text-orange-400' : 'text-green-400'}`}>
                                {isPaused ? "PAUSED" : `+ £${timer.livePay}`}
                            </div>
                            
                            <div className="flex gap-3">
                                {!startTime ? (
                                    <button onClick={handleClockIn} className="w-full py-5 rounded-3xl font-black text-xl bg-blue-600 text-white shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-play"></i> START
                                    </button>
                                ) : (
                                    <>
                                        <button onClick={handlePauseResume} className={`flex-1 py-5 rounded-3xl font-black text-lg transition-all ${isPaused ? 'bg-green-500 shadow-green-500/20' : 'bg-orange-500 shadow-orange-500/20'} text-white shadow-lg flex items-center justify-center gap-2`}>
                                            <i className={`fa-solid ${isPaused ? 'fa-play' : 'fa-pause'}`}></i> {isPaused ? "RESUME" : "PAUSE"}
                                        </button>
                                        <button onClick={handleClockOut} className="flex-1 py-5 rounded-3xl font-black text-lg bg-rose-500 text-white shadow-lg shadow-rose-500/20 flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-stop"></i> FINISH
                                        </button>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Stats Grid */}
                    <div className="px-6 grid grid-cols-2 gap-4 mb-8">
                        <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Today</p>
                            <p className="text-lg font-black text-slate-800">£{stats.todayP.toFixed(2)}</p>
                            <p className="text-[10px] font-bold text-blue-500">{stats.todayH.toFixed(2)}h worked</p>
                        </div>
                        <div className="bg-blue-600 p-5 rounded-3xl shadow-lg shadow-blue-600/20 text-white">
                            <p className="text-[10px] font-black text-blue-200 uppercase mb-1">Lifetime</p>
                            <p className="text-lg font-black">£{stats.totalP.toFixed(2)}</p>
                            <p className="text-[10px] font-bold text-blue-100">{stats.totalH.toFixed(2)}h total</p>
                        </div>
                        <div className="bg-white p-4 rounded-2xl border border-slate-100">
                            <p className="text-[10px] font-black text-slate-400 uppercase">Weekly</p>
                            <p className="font-black text-slate-700">£{stats.weekP.toFixed(2)}</p>
                            <p className="text-[9px] font-bold text-slate-400">{stats.weekH.toFixed(2)}h</p>
                        </div>
                        <div className="bg-white p-4 rounded-2xl border border-slate-100">
                            <p className="text-[10px] font-black text-slate-400 uppercase">Monthly</p>
                            <p className="font-black text-slate-700">£{stats.monthP.toFixed(2)}</p>
                            <p className="text-[9px] font-bold text-slate-400">{stats.monthH.toFixed(2)}h</p>
                        </div>
                    </div>

                    {/* Activity Log */}
                    <div className="px-6 space-y-4">
                        <div className="flex justify-between items-center px-1">
                            <h2 className="font-black text-slate-800">Activity Log</h2>
                            <button onClick={exportCSV} className="text-[10px] font-black bg-slate-800 text-white px-3 py-1.5 rounded-lg flex items-center gap-1.5 active:scale-95 transition-transform">
                                <i className="fa-solid fa-download"></i> EXPORT CSV
                            </button>
                        </div>
                        
                        {entries.length === 0 && <div className="text-center py-10 text-slate-300 text-sm font-bold italic bg-white rounded-3xl border border-dashed border-slate-200 tracking-tight">No sessions logged yet.</div>}
                        
                        {entries.map(e => (
                            <div key={e.id} className="bg-white p-5 rounded-3xl border border-slate-50 shadow-sm flex justify-between items-center group">
                                <div className="flex items-center gap-4">
                                    <div className="bg-slate-50 h-12 w-12 rounded-2xl flex flex-col items-center justify-center text-slate-400">
                                        <span className="text-[8px] font-black uppercase">{new Date(e.start).toLocaleDateString('en-GB', {month:'short'})}</span>
                                        <span className="text-sm font-black text-slate-700">{new Date(e.start).getDate()}</span>
                                    </div>
                                    <div>
                                        <p className="text-xs font-bold text-slate-800 italic opacity-60">
                                            {new Date(e.start).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - {new Date(e.end).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                                        </p>
                                        <p className="text-sm font-black text-slate-900 mt-0.5">{e.hours.toFixed(2)}h session</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="font-black text-green-600 text-lg leading-none">£{e.pay.toFixed(2)}</p>
                                    <button onClick={() => deleteEntry(e.id)} className="text-slate-200 hover:text-rose-500 mt-2 transition-colors"><i className="fa-solid fa-trash text-xs"></i></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
