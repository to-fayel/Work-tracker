<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeKeeper Elite</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/stopwatch.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/512/stopwatch.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            transition: background-color 0.4s ease;
            overscroll-behavior-y: contain;
        }

        .timer-font { font-family: 'JetBrains Mono', monospace; }
        .tap-bounce { transition: transform 0.1s ease; }
        .tap-bounce:active { transform: scale(0.95); }
        
        .dark { background-color: #020617; color: #f8fafc; }
        .dark .bg-white { background-color: #0f172a; border-color: #1e293b; color: #f8fafc; }
        
        /* Glassmorphism Classes */
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Fixed Date Contrast */
        .date-tile { background-color: #f1f5f9 !important; color: #0f172a !important; }
        .dark .date-tile { background-color: #1e293b !important; color: #ffffff !important; }

        input[type="time"], input[type="date"], input[type="number"] {
            background: transparent;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            padding: 0.75rem;
            width: 100%;
        }
        .dark input { border-color: #334155; color: white; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            // --- STATE ---
            const [view, setView] = useState('dashboard'); // 'dashboard' or 'settings'
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('work-entries')) || []);
            const [startTime, setStartTime] = useState(() => {
                const saved = localStorage.getItem('active-start-time');
                return saved ? new Date(saved) : null;
            });
            const [isPaused, setIsPaused] = useState(() => JSON.parse(localStorage.getItem('is-paused')) || false);
            const [accumulatedMs, setAccumulatedMs] = useState(() => JSON.parse(localStorage.getItem('accumulated-ms')) || 0);
            const [hourlyRate, setHourlyRate] = useState(() => parseFloat(localStorage.getItem('hourly-rate')) || 6.00);
            const [isDark, setIsDark] = useState(() => JSON.parse(localStorage.getItem('dark-mode')) || false);
            const [showManual, setShowManual] = useState(false);
            const [editingEntry, setEditingEntry] = useState(null);
            const [timer, setTimer] = useState({ elapsed: "00:00:00", livePay: "0.00" });

            // --- PERSISTENCE ---
            useEffect(() => {
                localStorage.setItem('work-entries', JSON.stringify(entries));
                localStorage.setItem('active-start-time', startTime ? startTime.toISOString() : '');
                localStorage.setItem('is-paused', JSON.stringify(isPaused));
                localStorage.setItem('accumulated-ms', JSON.stringify(accumulatedMs));
                localStorage.setItem('hourly-rate', hourlyRate.toString());
                localStorage.setItem('dark-mode', JSON.stringify(isDark));
                document.body.className = isDark ? 'dark' : '';
            }, [entries, startTime, isPaused, accumulatedMs, hourlyRate, isDark]);

            // --- LIVE TIMER LOGIC ---
            useEffect(() => {
                let interval;
                if (startTime && !isPaused) {
                    interval = setInterval(() => {
                        const totalMs = (new Date() - startTime) + accumulatedMs;
                        const h = Math.floor(totalMs / 3600000);
                        const m = Math.floor((totalMs % 3600000) / 60000);
                        const s = Math.floor((totalMs % 60000) / 1000);
                        setTimer({
                            elapsed: `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`,
                            livePay: ((totalMs / 3600000) * hourlyRate).toFixed(2)
                        });
                    }, 1000);
                } else {
                    const totalMs = accumulatedMs;
                    const h = Math.floor(totalMs / 3600000);
                    const m = Math.floor((totalMs % 3600000) / 60000);
                    setTimer({
                        elapsed: `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:00`,
                        livePay: ((totalMs / 3600000) * hourlyRate).toFixed(2)
                    });
                }
                return () => clearInterval(interval);
            }, [startTime, isPaused, accumulatedMs, hourlyRate]);

            // --- CALCULATIONS ---
            const stats = useMemo(() => {
                const now = new Date();
                const today = now.toLocaleDateString();
                return {
                    daily: entries.filter(e => new Date(e.start).toLocaleDateString() === today).reduce((a, b) => a + b.pay, 0),
                    total: entries.reduce((a, b) => a + b.pay, 0)
                };
            }, [entries]);

            // --- ACTIONS ---
            const handleFinish = () => {
                if(!confirm("Finish this session?")) return;
                const finalMs = (startTime && !isPaused ? (new Date() - startTime) : 0) + accumulatedMs;
                const hours = finalMs / 3600000;
                if(hours < 0.01) { resetTimer(); return; }
                const newEntry = { id: Date.now(), start: new Date(Date.now()-finalMs).toISOString(), end: new Date().toISOString(), hours, pay: hours * hourlyRate };
                setEntries([newEntry, ...entries]);
                resetTimer();
            };

            const resetTimer = () => { setStartTime(null); setIsPaused(false); setAccumulatedMs(0); };

            const handleManualSubmit = (e) => {
                e.preventDefault();
                const d = new FormData(e.target);
                const rate = parseFloat(d.get('rate')) || hourlyRate;
                let start = new Date(`${d.get('date')}T${d.get('start')}`);
                let end = new Date(`${d.get('date')}T${d.get('end')}`);
                if (end <= start) end.setDate(end.getDate() + 1);
                const h = (end - start) / 3600000;
                const entry = { id: editingEntry?.id || Date.now(), start: start.toISOString(), end: end.toISOString(), hours: h, pay: h * rate };
                
                if (editingEntry) setEntries(entries.map(ent => ent.id === editingEntry.id ? entry : ent));
                else setEntries([entry, ...entries]);
                
                setShowManual(false); setEditingEntry(null);
            };

            const exportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text("TimeKeeper Earnings Report", 14, 20);
                doc.autoTable({
                    head: [["Date", "In", "Out", "Hours", "Pay"]],
                    body: entries.map(e => [new Date(e.start).toLocaleDateString(), new Date(e.start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), new Date(e.end).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), e.hours.toFixed(2), `£${e.pay.toFixed(2)}`]),
                    startY: 30
                });
                doc.save("Report.pdf");
            };

            // --- COMPONENTS ---
            const Dashboard = () => (
                <div className="animate-in fade-in duration-500">
                    <section className={`rounded-[2.5rem] p-8 mb-6 transition-all ${startTime && !isPaused ? 'bg-slate-900 text-white shadow-2xl scale-[1.02]' : 'glass shadow-xl'}`}>
                        <div className="text-center">
                            <p className="text-[10px] font-black uppercase tracking-[0.2em] mb-2 text-blue-500">Live Tracker</p>
                            <div className="timer-font text-6xl font-bold tracking-tighter mb-4 tabular-nums">{timer.elapsed}</div>
                            <div className="flex items-center justify-center gap-2 mb-8">
                                <span className="text-2xl font-black">£{timer.livePay}</span>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            {!startTime ? (
                                <button onClick={() => setStartTime(new Date())} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-bold text-lg tap-bounce shadow-lg shadow-blue-600/30">Start Shift</button>
                            ) : (
                                <>
                                    <button onClick={() => { if(isPaused){ setStartTime(new Date()); setIsPaused(false); } else { setAccumulatedMs(prev => prev + (new Date()-startTime)); setIsPaused(true); } }} className="flex-1 py-5 bg-slate-800 text-white rounded-3xl font-bold tap-bounce">{isPaused ? "Resume" : "Pause"}</button>
                                    <button onClick={handleFinish} className="flex-1 py-5 bg-rose-500 text-white rounded-3xl font-bold tap-bounce uppercase text-sm tracking-widest">Finish</button>
                                </>
                            )}
                        </div>
                    </section>

                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="glass p-5 rounded-3xl text-center">
                            <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Today</p>
                            <p className="text-lg font-black">£{stats.daily.toFixed(2)}</p>
                        </div>
                        <div className="glass p-5 rounded-3xl text-center">
                            <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Total</p>
                            <p className="text-lg font-black">£{stats.total.toFixed(2)}</p>
                        </div>
                    </div>

                    <div className="flex justify-between items-center mb-6 px-2">
                        <h2 className="text-xl font-black">History</h2>
                        <button onClick={exportPDF} className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">PDF Export</button>
                    </div>

                    <div className="space-y-4">
                        {entries.map(e => (
                            <div key={e.id} className="glass p-5 rounded-[2rem] flex justify-between items-center transition-transform active:scale-95">
                                <div className="flex items-center gap-4">
                                    <div className="date-tile h-14 w-14 rounded-2xl flex flex-col items-center justify-center border border-white/50 shadow-sm">
                                        <span className="text-[9px] font-black uppercase leading-none opacity-60">{new Date(e.start).toLocaleDateString('en-GB',{month:'short'})}</span>
                                        <span className="text-lg font-black leading-none">{new Date(e.start).getDate()}</span>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase">{new Date(e.start).getHours()}:{String(new Date(e.start).getMinutes()).padStart(2,'0')} - {new Date(e.end).getHours()}:{String(new Date(e.end).getMinutes()).padStart(2,'0')}</p>
                                        <p className="text-base font-black">{e.hours.toFixed(2)}h</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-emerald-500 font-black text-xl leading-none">£{e.pay.toFixed(2)}</p>
                                    <div className="flex gap-4 justify-end mt-2 text-slate-300">
                                        <button onClick={() => setEditingEntry(e)}><i className="fa-solid fa-pen-to-square"></i></button>
                                        <button onClick={() => confirm("Delete?") && setEntries(entries.filter(x=>x.id!==e.id))}><i className="fa-solid fa-trash-can"></i></button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const Settings = () => (
                <div className="animate-in slide-in-from-bottom duration-500">
                    <h2 className="text-2xl font-black mb-8 px-2">Preferences</h2>
                    <div className="space-y-4">
                        <div className="glass p-6 rounded-[2rem] flex justify-between items-center">
                            <span className="font-bold">Dark Mode</span>
                            <button onClick={() => setIsDark(!isDark)} className={`w-12 h-6 rounded-full transition-all relative ${isDark ? 'bg-blue-600' : 'bg-slate-200'}`}>
                                <div className={`absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform ${isDark ? 'translate-x-6' : ''}`} />
                            </button>
                        </div>
                        <div className="glass p-6 rounded-[2rem] flex justify-between items-center">
                            <span className="font-bold">Hourly Rate</span>
                            <div className="flex items-center gap-1 font-black text-blue-600">£<input type="number" step="0.01" value={hourlyRate} onChange={(e)=>setHourlyRate(parseFloat(e.target.value)||0)} className="w-16 border-none text-right" /></div>
                        </div>
                        <button onClick={() => {if(confirm("Clear all data?")) {setEntries([]); resetTimer();}}} className="w-full py-5 bg-rose-50 text-rose-600 dark:bg-rose-950/20 rounded-[2rem] font-bold text-sm uppercase tracking-widest mt-8">Reset Factory Data</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 pb-32">
                    <header className="flex justify-between items-center mb-10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30 text-white">
                                <i className="fa-solid fa-stopwatch"></i>
                            </div>
                            <h1 className="text-xl font-black tracking-tight">TimeKeeper</h1>
                        </div>
                        <button onClick={() => setView(view === 'dashboard' ? 'settings' : 'dashboard')} className="w-12 h-12 glass flex items-center justify-center rounded-2xl tap-bounce">
                            <i className={`fa-solid ${view === 'dashboard' ? 'fa-gear' : 'fa-house'} text-slate-400`}></i>
                        </button>
                    </header>

                    {view === 'dashboard' ? <Dashboard /> : <Settings />}

                    {/* Manual Entry Button */}
                    {view === 'dashboard' && (
                        <button onClick={() => setShowManual(true)} className="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl tap-bounce z-40">
                            <i className="fa-solid fa-plus"></i>
                        </button>
                    )}

                    {/* Manual/Edit Modal */}
                    {(showManual || editingEntry) && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm">
                            <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-slate-900 dark:text-white">
                                <h3 className="text-2xl font-black mb-8 text-center">{editingEntry ? "Edit Session" : "Manual Log"}</h3>
                                <form onSubmit={handleManualSubmit} className="space-y-6">
                                    <input type="date" name="date" required defaultValue={editingEntry ? new Date(editingEntry.start).toISOString().split('T')[0] : new Date().toISOString().split('T')[0]} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="time" name="start" required defaultValue={editingEntry ? new Date(editingEntry.start).toTimeString().slice(0,5) : ""} />
                                        <input type="time" name="end" required defaultValue={editingEntry ? new Date(editingEntry.end).toTimeString().slice(0,5) : ""} />
                                    </div>
                                    <input type="number" step="0.01" name="rate" placeholder="Rate (£/hr)" required defaultValue={editingEntry ? (editingEntry.pay / editingEntry.hours).toFixed(2) : hourlyRate} />
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => {setShowManual(false); setEditingEntry(null);}} className="flex-1 py-4 rounded-2xl font-bold bg-slate-100 dark:bg-slate-800">Cancel</button>
                                        <button type="submit" className="flex-1 py-4 rounded-2xl font-bold bg-blue-600 text-white shadow-lg shadow-blue-600/30">Save</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
