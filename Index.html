<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeKeeper Ultra</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TimeKeeper">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/stopwatch.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/512/stopwatch.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease; }
        .timer-font { font-family: 'JetBrains Mono', monospace; }
        .dark { background-color: #0f172a; color: #f8fafc; }
        .dark .bg-white { background-color: #1e293b; border-color: #334155; color: #f8fafc; }
        .dark .text-slate-800 { color: #f1f5f9; }
        .dark .text-slate-400 { color: #94a3b8; }
        .dark .border-slate-100 { border-color: #334155; }
        .dark input { border-color: #475569; color: white; }
        input[type="time"], input[type="date"] { border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.6rem; width: 100%; background: transparent; outline: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('work-entries')) || []);
            const [startTime, setStartTime] = useState(() => {
                const saved = localStorage.getItem('active-start-time');
                return saved ? new Date(saved) : null;
            });
            const [isPaused, setIsPaused] = useState(() => JSON.parse(localStorage.getItem('is-paused')) || false);
            const [accumulatedMs, setAccumulatedMs] = useState(() => JSON.parse(localStorage.getItem('accumulated-ms')) || 0);
            const [hourlyRate, setHourlyRate] = useState(() => parseFloat(localStorage.getItem('hourly-rate')) || 6.00);
            const [isDark, setIsDark] = useState(() => JSON.parse(localStorage.getItem('dark-mode')) || false);
            const [showManual, setShowManual] = useState(false);
            const [timer, setTimer] = useState({ elapsed: "00:00:00", livePay: "0.00" });

            useEffect(() => {
                localStorage.setItem('work-entries', JSON.stringify(entries));
                localStorage.setItem('active-start-time', startTime ? startTime.toISOString() : '');
                localStorage.setItem('is-paused', JSON.stringify(isPaused));
                localStorage.setItem('accumulated-ms', JSON.stringify(accumulatedMs));
                localStorage.setItem('hourly-rate', hourlyRate.toString());
                localStorage.setItem('dark-mode', JSON.stringify(isDark));
                document.body.className = isDark ? 'dark' : '';
            }, [entries, startTime, isPaused, accumulatedMs, hourlyRate, isDark]);

            useEffect(() => {
                let interval;
                if (startTime && !isPaused) {
                    interval = setInterval(() => {
                        const totalMs = (new Date() - startTime) + accumulatedMs;
                        const h = Math.floor(totalMs / 3600000);
                        const m = Math.floor((totalMs % 3600000) / 60000);
                        const s = Math.floor((totalMs % 60000) / 1000);
                        setTimer({
                            elapsed: `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`,
                            livePay: ((totalMs / 3600000) * hourlyRate).toFixed(2)
                        });
                    }, 1000);
                } else {
                    const totalMs = accumulatedMs;
                    const h = Math.floor(totalMs / 3600000);
                    const m = Math.floor((totalMs % 3600000) / 60000);
                    const s = Math.floor((totalMs % 60000) / 1000);
                    setTimer({
                        elapsed: `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`,
                        livePay: ((totalMs / 3600000) * hourlyRate).toFixed(2)
                    });
                }
                return () => clearInterval(interval);
            }, [startTime, isPaused, accumulatedMs, hourlyRate]);

            const exportCSV = () => {
                const headers = "Date,Start,End,Hours,Pay\n";
                const rows = entries.map(e => `${new Date(e.start).toLocaleDateString()},${new Date(e.start).toLocaleTimeString()},${new Date(e.end).toLocaleTimeString()},${e.hours.toFixed(2)},${e.pay.toFixed(2)}`).join("\n");
                const blob = new Blob([headers + rows], { type: 'text/csv' });
                const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob); a.download = "WorkLog.csv"; a.click();
            };

            const exportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(18);
                doc.text("Work Session Report", 14, 22);
                doc.setFontSize(11);
                doc.setTextColor(100);
                doc.text(`Generated on: ${new Date().toLocaleDateString()}`, 14, 30);

                const tableColumn = ["Date", "Start", "End", "Hours", "Earnings"];
                const tableRows = entries.map(e => [
                    new Date(e.start).toLocaleDateString(),
                    new Date(e.start).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    new Date(e.end).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    `${e.hours.toFixed(2)}h`,
                    `£${e.pay.toFixed(2)}`
                ]);

                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 40,
                    theme: 'striped',
                    headStyles: { fillColor: [37, 99, 235] }
                });

                doc.save(`TimeKeeper_Report_${new Date().toLocaleDateString()}.pdf`);
            };

            const stats = useMemo(() => {
                return entries.reduce((acc, curr) => {
                    acc.tH += curr.hours; acc.tP += curr.pay;
                    return acc;
                }, { tH: 0, tP: 0 });
            }, [entries]);

            return (
                <div className="max-w-md mx-auto min-h-screen p-6">
                    <div className="flex justify-between items-center mb-8 pt-2">
                        <div className="flex items-center gap-3">
                            <img src="https://img.icons8.com/fluency/96/stopwatch.png" className="w-10 h-10 shadow-lg rounded-xl" />
                            <h1 className="text-2xl font-black">TimeKeeper</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsDark(!isDark)} className="w-11 h-11 flex items-center justify-center rounded-2xl bg-white shadow-sm border border-slate-100 active:scale-90 transition-all">
                                <i className={`fa-solid ${isDark ? 'fa-sun text-yellow-500' : 'fa-moon text-slate-400'}`}></i>
                            </button>
                            <button onClick={() => setShowManual(true)} className="w-11 h-11 flex items-center justify-center rounded-2xl bg-blue-600 text-white shadow-lg shadow-blue-500/40 active:scale-90 transition-all">
                                <i className="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>

                    <div className={`rounded-[2.8rem] p-10 text-center mb-8 transition-all duration-500 ${startTime ? 'bg-slate-900 text-white shadow-2xl scale-105' : 'bg-white border border-slate-100 shadow-xl shadow-slate-200/50'}`}>
                        <div className="timer-font text-6xl font-black mb-2 tracking-tighter tabular-nums">{timer.elapsed}</div>
                        <div className={`text-xl font-bold mb-8 flex items-center justify-center gap-2 ${isPaused ? 'text-orange-400' : 'text-green-400'}`}>
                            {isPaused ? "PAUSED" : `£${timer.livePay}`}
                        </div>
                        <div className="flex gap-3">
                            {!startTime ? (
                                <button onClick={() => { setStartTime(new Date()); setIsPaused(false); setAccumulatedMs(0); }} className="w-full py-5 rounded-3xl font-black text-xl bg-blue-600 text-white shadow-lg">START SHIFT</button>
                            ) : (
                                <>
                                    <button onClick={() => { if(isPaused){ setStartTime(new Date()); setIsPaused(false); } else { setAccumulatedMs(prev => prev + (new Date()-startTime)); setIsPaused(true); } }} className={`flex-1 py-5 rounded-3xl font-black text-lg ${isPaused ? 'bg-green-500' : 'bg-orange-500'} text-white shadow-lg`}>{isPaused ? "RESUME" : "PAUSE"}</button>
                                    <button onClick={() => { if(confirm("Finish?")) { const final = (startTime && !isPaused ? (new Date()-startTime) : 0) + accumulatedMs; const h = final/3600000; setEntries([{id:Date.now(), start:new Date(Date.now()-final).toISOString(), end:new Date().toISOString(), hours:h, pay:h*hourlyRate}, ...entries]); setStartTime(null); setAccumulatedMs(0); setIsPaused(false); } }} className="flex-1 py-5 rounded-3xl font-black text-lg bg-rose-500 text-white shadow-lg">FINISH</button>
                                </>
                            )}
                        </div>
                    </div>

                    <div className="flex justify-between items-end mb-5 px-1">
                        <h2 className="text-xl font-black">Activity</h2>
                        <div className="flex gap-3">
                            <button onClick={exportCSV} className="text-[10px] font-black text-blue-600 uppercase tracking-widest border-b-2 border-blue-100 pb-0.5">CSV</button>
                            <button onClick={exportPDF} className="text-[10px] font-black text-rose-600 uppercase tracking-widest border-b-2 border-rose-100 pb-0.5">PDF</button>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {entries.map(e => (
                            <div key={e.id} className="bg-white p-5 rounded-[2rem] border border-slate-50 shadow-sm flex justify-between items-center transition-all">
                                <div className="flex items-center gap-4">
                                    <div className="bg-slate-50 h-14 w-14 rounded-2xl flex flex-col items-center justify-center text-slate-400 border border-slate-100">
                                        <span className="text-[9px] font-black uppercase">{new Date(e.start).toLocaleDateString('en-GB',{month:'short'})}</span>
                                        <span className="text-lg font-black text-slate-800 leading-tight">{new Date(e.start).getDate()}</span>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">{new Date(e.start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} • {new Date(e.end).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</p>
                                        <p className="text-base font-black text-slate-900">{e.hours.toFixed(2)} Hours</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="font-black text-green-600 text-xl">£{e.pay.toFixed(2)}</p>
                                    <button onClick={()=>confirm("Delete?") && setEntries(entries.filter(x=>x.id!==e.id))} className="text-slate-200 hover:text-rose-500 mt-1"><i className="fa-solid fa-trash-can text-xs"></i></button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {showManual && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl">
                                <h3 className="text-2xl font-black mb-8 text-center">Manual Entry</h3>
                                <form onSubmit={(e) => { e.preventDefault(); const d = new FormData(e.target); const start = new Date(`${d.get('date')}T${d.get('start')}`); const end = new Date(`${d.get('date')}T${d.get('end')}`); const h = (end-start)/3600000; if(h<=0) return alert("Error"); setEntries([{id:Date.now(), start:start.toISOString(), end:end.toISOString(), hours:h, pay:h*hourlyRate}, ...entries]); setShowManual(false); }} className="space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Date</label>
                                        <input type="date" name="date" required defaultValue={new Date().toISOString().split('T')[0]} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="time" name="start" required />
                                        <input type="time" name="end" required />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={()=>setShowManual(false)} className="flex-1 py-5 rounded-2xl font-black text-slate-400 bg-slate-100 uppercase text-[10px]">Cancel</button>
                                        <button type="submit" className="flex-1 py-5 rounded-2xl font-black text-white bg-blue-600 uppercase text-[10px] shadow-lg shadow-blue-500/30">Add Log</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
