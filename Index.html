<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeKeeper Mobile</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [entries, setEntries] = useState(() => {
                const saved = localStorage.getItem('work-entries');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [startTime, setStartTime] = useState(() => {
                const saved = localStorage.getItem('active-start-time');
                return saved ? new Date(saved) : null;
            });

            const [hourlyRate, setHourlyRate] = useState(() => {
                const saved = localStorage.getItem('hourly-rate');
                return saved ? parseFloat(saved) : 6.00;
            });

            useEffect(() => {
                localStorage.setItem('work-entries', JSON.stringify(entries));
                localStorage.setItem('active-start-time', startTime ? startTime.toISOString() : '');
                localStorage.setItem('hourly-rate', hourlyRate.toString());
            }, [entries, startTime, hourlyRate]);

            const handleClockIn = () => { if (!startTime) setStartTime(new Date()); };

            const handleClockOut = () => {
                if (!startTime) return;
                const endTime = new Date();
                const hours = (endTime - startTime) / (1000 * 60 * 60);
                const newEntry = {
                    id: Date.now(),
                    start: startTime.toISOString(),
                    end: endTime.toISOString(),
                    hours: hours,
                    pay: hours * hourlyRate
                };
                setEntries([newEntry, ...entries]);
                setStartTime(null);
            };

            const totals = useMemo(() => entries.reduce((acc, curr) => ({
                hours: acc.hours + curr.hours,
                pay: acc.pay + curr.pay
            }), { hours: 0, pay: 0 }), [entries]);

            return (
                <div className="max-w-md mx-auto p-6 min-h-screen">
                    <header className="flex justify-between items-center mb-8">
                        <h1 className="text-2xl font-extrabold text-blue-600">TimeKeeper</h1>
                        <div className="bg-white px-3 py-1 rounded-full shadow-sm border text-sm font-bold">
                            £<input type="number" value={hourlyRate} onChange={(e) => setHourlyRate(e.target.value)} className="w-10 outline-none"/>/hr
                        </div>
                    </header>

                    <div className="bg-white rounded-3xl p-8 shadow-xl mb-8 text-center border border-gray-100">
                        {startTime ? (
                            <div className="text-orange-500 font-bold mb-4 animate-pulse">● Working Now</div>
                        ) : (
                            <div className="text-gray-400 mb-4 font-medium">Ready to start?</div>
                        )}
                        <button 
                            onClick={startTime ? handleClockOut : handleClockIn}
                            className={`w-full py-5 rounded-2xl font-black text-xl shadow-lg transition-transform active:scale-95 ${startTime ? 'bg-red-500 text-white shadow-red-200' : 'bg-blue-600 text-white shadow-blue-200'}`}
                        >
                            {startTime ? 'CLOCK OUT' : 'CLOCK IN'}
                        </button>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="bg-blue-50 p-4 rounded-2xl">
                            <p className="text-[10px] uppercase font-bold text-blue-400">Total Hours</p>
                            <p className="text-xl font-black text-blue-900">{totals.hours.toFixed(2)}h</p>
                        </div>
                        <div className="bg-green-50 p-4 rounded-2xl">
                            <p className="text-[10px] uppercase font-bold text-green-400">Total Pay</p>
                            <p className="text-xl font-black text-green-700">£{totals.pay.toFixed(2)}</p>
                        </div>
                    </div>

                    <h2 className="font-bold text-gray-500 mb-4 px-1">Recent Logs</h2>
                    <div className="space-y-3">
                        {entries.map(e => (
                            <div key={e.id} className="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-50">
                                <div>
                                    <p className="text-xs font-bold text-gray-400">{new Date(e.start).toLocaleDateString()}</p>
                                    <p className="font-bold text-gray-800">{new Date(e.start).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} - {new Date(e.end).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                </div>
                                <div className="text-right">
                                    <p className="font-black text-green-600">£{e.pay.toFixed(2)}</p>
                                    <p className="text-[10px] font-bold text-gray-300">{e.hours.toFixed(2)} hrs</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
